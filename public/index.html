<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Aplicación web offline-first para la gestión de artículos académicos.">

<title>Gestión de Artículos</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header>
<h1>Gestión de Artículos</h1>
<p class="subtitle">Sistema de registro de artículos académicos</p>
</header>

<main>

<section class="card">

<h2>Registrar Nuevo Artículo</h2>

<form id="formArticulo">

<label>Título</label>
<input type="text" id="titulo" required>

<label>Autor</label>
<input type="text" id="autor" required>

<label>Resumen</label>
<textarea id="resumen" required></textarea>

<button type="submit">Guardar</button>

</form>

</section>

<section class="card">

<h2>Artículos Registrados</h2>

<div id="lista">
<p class="empty">No hay artículos registrados</p>
</div>

</section>

</main>

<footer>
<p>Meta 1.7 - Arquitectura Offline First</p>
</footer>

<script src="app.js"></script>

</body>
</html>
